name: Deploy Landing

on:
  pull_request:
    paths:
      - 'apps/landing/**'
      - 'packages/**'
      - '.github/workflows/landing.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/landing/**'
      - 'packages/**'
      - '.github/workflows/landing.yml'
  workflow_dispatch:

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  deploy-preview:
    needs: checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Landing
        run: pnpm run build --filter=@t-minus/landing

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy-preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/landing/dist --project-name=t-minus-landing
          
      - name: Comment PR with Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.GITHUB_HEAD_REF || context.payload.pull_request.head.ref;
            const project = 't-minus-landing';
            // Cloudflare Pages preview URL format: <branch-slug>.<project>.pages.dev
            // The slug is usually the branch name with special chars replaced by dashes
            const slug = branch.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
            const previewUrl = `https://${slug}.${project}.pages.dev`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Landing preview deployed!\n\nCheck the preview deployment here: ${previewUrl}\n\n*Note: It may take a minute for the URL to be active.*`
            })

  deploy-production:
    needs: checks
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Landing
        run: pnpm run build --filter=@t-minus/landing

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/landing/dist --project-name=t-minus-landing
